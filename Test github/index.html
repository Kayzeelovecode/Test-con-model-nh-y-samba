<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>TEST AR</title>
<script type="module" src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@300;400;500;600;700&display=swap');

  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --green: #2ECC8A;
    --green-dark: #1a7a52;
    --green-dim: rgba(46,204,138,0.15);
    --bg: #0a0f0d;
    --surface: #111a15;
    --surface2: #172119;
    --text: #e8f5ee;
    --text-muted: #7aab8e;
    --border: rgba(46,204,138,0.2);
  }

  html, body {
    height: 100%;
    background: var(--bg);
    color: var(--text);
    font-family: 'Be Vietnam Pro', sans-serif;
    overflow: hidden;
  }

  /* ── LANDING SCREEN ── */
  #landing {
    height: 100dvh;
    display: flex;
    flex-direction: column;
    position: relative;
    overflow: hidden;
  }

  /* Animated bg grid */
  #landing::before {
    content: '';
    position: absolute;
    inset: 0;
    background-image:
      linear-gradient(rgba(46,204,138,0.04) 1px, transparent 1px),
      linear-gradient(90deg, rgba(46,204,138,0.04) 1px, transparent 1px);
    background-size: 40px 40px;
    animation: gridMove 20s linear infinite;
    pointer-events: none;
  }
  @keyframes gridMove {
    0% { transform: translateY(0); }
    100% { transform: translateY(40px); }
  }

  /* Glow orb */
  #landing::after {
    content: '';
    position: absolute;
    top: 20%;
    left: 50%;
    transform: translateX(-50%);
    width: 300px;
    height: 300px;
    background: radial-gradient(circle, rgba(46,204,138,0.12) 0%, transparent 70%);
    pointer-events: none;
    animation: pulse 4s ease-in-out infinite;
  }
  @keyframes pulse {
    0%,100% { opacity: 0.6; transform: translateX(-50%) scale(1); }
    50% { opacity: 1; transform: translateX(-50%) scale(1.15); }
  }

  .top-bar {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 52px 24px 16px;
    position: relative;
    z-index: 2;
  }

  .logo-dot {
    width: 36px;
    height: 36px;
    border-radius: 8px;
    background: var(--green);
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }
  .logo-dot svg { width: 20px; height: 20px; fill: #0a0f0d; }

  .top-bar h1 {
    font-size: 22px;
    font-weight: 700;
    letter-spacing: -0.3px;
    color: var(--text);
  }

  .live-badge {
    margin-left: auto;
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 1.5px;
    color: var(--green);
    text-transform: uppercase;
  }
  .live-dot {
    width: 7px; height: 7px;
    border-radius: 50%;
    background: var(--green);
    animation: blink 1.4s ease-in-out infinite;
  }
  @keyframes blink {
    0%,100% { opacity: 1; } 50% { opacity: 0.2; }
  }

  /* Preview area */
  .preview-area {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
    z-index: 2;
  }

  .scan-frame {
    width: min(280px, 72vw);
    height: min(280px, 72vw);
    position: relative;
  }

  /* Corner brackets */
  .scan-frame::before, .scan-frame::after,
  .scan-frame .corner-br, .scan-frame .corner-bl {
    content: '';
    position: absolute;
    width: 28px; height: 28px;
    border-color: var(--green);
    border-style: solid;
    border-width: 0;
  }
  .scan-frame::before { top: 0; left: 0; border-top-width: 3px; border-left-width: 3px; border-radius: 4px 0 0 0; }
  .scan-frame::after  { top: 0; right: 0; border-top-width: 3px; border-right-width: 3px; border-radius: 0 4px 0 0; }
  .scan-frame .corner-br { bottom: 0; right: 0; border-bottom-width: 3px; border-right-width: 3px; border-radius: 0 0 4px 0; }
  .scan-frame .corner-bl { bottom: 0; left: 0; border-bottom-width: 3px; border-left-width: 3px; border-radius: 0 0 0 4px; }

  /* Scan line */
  .scan-line {
    position: absolute;
    left: 10px; right: 10px;
    height: 2px;
    background: linear-gradient(90deg, transparent, var(--green), transparent);
    animation: scanMove 2.5s ease-in-out infinite;
    border-radius: 1px;
  }
  @keyframes scanMove {
    0% { top: 10px; opacity: 0; }
    10% { opacity: 1; }
    90% { opacity: 1; }
    100% { top: calc(100% - 10px); opacity: 0; }
  }

  .frame-inner {
    position: absolute;
    inset: 10px;
    border-radius: 16px;
    background: rgba(46,204,138,0.04);
    border: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 12px;
  }

  .frame-icon {
    width: 64px; height: 64px;
    opacity: 0.4;
  }

  .frame-label {
    font-size: 12px;
    color: var(--text-muted);
    text-align: center;
    letter-spacing: 0.3px;
    padding: 0 16px;
    line-height: 1.5;
  }

  /* Bottom sheet */
  .bottom-sheet {
    background: var(--surface);
    border-radius: 24px 24px 0 0;
    border-top: 1px solid var(--border);
    padding: 20px 20px 40px;
    position: relative;
    z-index: 2;
  }

  .sheet-handle {
    width: 36px; height: 4px;
    background: rgba(255,255,255,0.15);
    border-radius: 2px;
    margin: 0 auto 20px;
  }

  .instruction {
    text-align: center;
    font-size: 14px;
    color: var(--text-muted);
    margin-bottom: 6px;
    line-height: 1.5;
  }
  .instruction strong {
    color: var(--text);
    font-weight: 600;
  }

  .btn-ar {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    width: 100%;
    padding: 17px 20px;
    background: var(--green);
    color: #0a0f0d;
    border: none;
    border-radius: 14px;
    font-family: 'Be Vietnam Pro', sans-serif;
    font-size: 16px;
    font-weight: 700;
    cursor: pointer;
    margin-top: 16px;
    letter-spacing: -0.2px;
    transition: transform 0.15s, opacity 0.15s;
    -webkit-tap-highlight-color: transparent;
  }
  .btn-ar:active { transform: scale(0.97); opacity: 0.9; }
  .btn-ar svg { width: 22px; height: 22px; flex-shrink: 0; }

  .btn-info {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    width: 100%;
    padding: 14px 20px;
    background: transparent;
    color: var(--text-muted);
    border: 1px solid var(--border);
    border-radius: 14px;
    font-family: 'Be Vietnam Pro', sans-serif;
    font-size: 14px;
    font-weight: 500;
    cursor: pointer;
    margin-top: 10px;
    transition: background 0.2s, color 0.2s;
    -webkit-tap-highlight-color: transparent;
  }
  .btn-info:active { background: var(--green-dim); color: var(--green); }

  /* ── AR SCREEN (WebXR) ── */
  #ar-screen {
    display: none;
    position: fixed;
    inset: 0;
    background: #000;
    z-index: 100;
  }

  model-viewer {
    width: 100%;
    height: 100%;
    --poster-color: transparent;
  }

  .ar-topbar {
    position: absolute;
    top: 0; left: 0; right: 0;
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 52px 20px 16px;
    background: linear-gradient(to bottom, rgba(0,0,0,0.7) 0%, transparent 100%);
    z-index: 10;
    pointer-events: none;
  }

  .ar-title {
    font-size: 18px;
    font-weight: 700;
    color: #fff;
  }
  .ar-live {
    display: flex;
    align-items: center;
    gap: 5px;
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 1.5px;
    color: var(--green);
    text-transform: uppercase;
  }

  .btn-close {
    position: absolute;
    top: 48px;
    right: 16px;
    width: 40px; height: 40px;
    border-radius: 50%;
    background: rgba(0,0,0,0.5);
    border: 1px solid rgba(255,255,255,0.2);
    color: #fff;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    z-index: 20;
    pointer-events: all;
    -webkit-tap-highlight-color: transparent;
  }

  /* Model viewer AR button override */
  model-viewer::part(default-ar-button) { display: none; }

  /* Custom AR button inside model-viewer */
  #custom-ar-btn {
    position: absolute;
    bottom: 0; left: 0; right: 0;
    padding: 20px 20px 44px;
    background: linear-gradient(to top, rgba(0,0,0,0.8) 0%, transparent 100%);
    z-index: 10;
  }

  #launch-ar {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    width: 100%;
    padding: 17px;
    background: var(--green);
    color: #0a0f0d;
    border: none;
    border-radius: 14px;
    font-family: 'Be Vietnam Pro', sans-serif;
    font-size: 16px;
    font-weight: 700;
    cursor: pointer;
    -webkit-tap-highlight-color: transparent;
  }

  /* Hint overlay */
  #hint {
    position: absolute;
    bottom: 120px;
    left: 50%;
    transform: translateX(-50%);
    background: rgba(0,0,0,0.65);
    backdrop-filter: blur(10px);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 12px 18px;
    text-align: center;
    font-size: 13px;
    color: var(--text);
    z-index: 10;
    white-space: nowrap;
    display: none;
  }
  #hint.show { display: block; }

  /* iOS fallback */
  #ios-fallback {
    display: none;
    position: fixed;
    inset: 0;
    background: var(--bg);
    z-index: 200;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 32px;
    text-align: center;
    gap: 16px;
  }
  #ios-fallback h2 { font-size: 22px; font-weight: 700; }
  #ios-fallback p { font-size: 14px; color: var(--text-muted); line-height: 1.6; }
  #ios-fallback .btn-ar { max-width: 320px; }
  #ios-fallback .btn-back {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--text-muted);
    border-radius: 14px;
    padding: 14px 20px;
    font-family: 'Be Vietnam Pro', sans-serif;
    font-size: 14px;
    width: 100%; max-width: 320px;
    cursor: pointer;
  }
</style>
</head>
<body>

<!-- ══════════ LANDING ══════════ -->
<div id="landing">
  <div class="top-bar">
    <div class="logo-dot">
      <svg viewBox="0 0 24 24"><path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/></svg>
    </div>
    <h1>TEST AR</h1>
    <div class="live-badge">
      <div class="live-dot"></div>
      AR Live
    </div>
  </div>

  <div class="preview-area">
    <div class="scan-frame">
      <div class="corner-br"></div>
      <div class="corner-bl"></div>
      <div class="scan-line"></div>
      <div class="frame-inner">
        <svg class="frame-icon" viewBox="0 0 80 80" fill="none" stroke="#2ECC8A" stroke-width="1.5">
          <ellipse cx="40" cy="32" rx="12" ry="14"/>
          <path d="M20 65c0-11 9-20 20-20s20 9 20 20"/>
          <circle cx="40" cy="32" r="28" stroke-dasharray="4 4"/>
        </svg>
        <p class="frame-label">Nhân vật 3D sẽ<br>xuất hiện trong thực tế</p>
      </div>
    </div>
  </div>

  <div class="bottom-sheet">
    <div class="sheet-handle"></div>
    <p class="instruction">Lia camera xuống <strong>nền phẳng</strong><br>Khi nhận diện mặt đất, chạm để đặt nhân vật</p>
    <button class="btn-ar" id="btn-open-ar" onclick="openAR()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/>
        <polyline points="3.27 6.96 12 12.01 20.73 6.96"/>
        <line x1="12" y1="22.08" x2="12" y2="12"/>
      </svg>
      Mở AR thật để track mặt đất
    </button>
    <button class="btn-info" onclick="showInfo()">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/>
      </svg>
      Hướng dẫn sử dụng
    </button>
  </div>
</div>

<!-- ══════════ AR SCREEN ══════════ -->
<div id="ar-screen">
  <div class="ar-topbar">
    <div class="ar-title">TEST AR</div>
    <div class="ar-live"><div class="live-dot"></div>Live</div>
  </div>

  <button class="btn-close" onclick="closeAR()">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
      <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
    </svg>
  </button>

  <model-viewer
    id="mv"
    src="model_test_01.glb"
    ios-src="model_test_01.usdz"
    ar
    ar-modes="webxr scene-viewer quick-look"
    ar-placement="floor"
    ar-scale="fixed"
    camera-controls
    auto-rotate
    shadow-intensity="1"
    shadow-softness="0.8"
    exposure="1"
    camera-orbit="0deg 75deg 3m"
    min-camera-orbit="auto auto 1m"
    max-camera-orbit="auto auto 8m"
    scale="1 1 1"
    style="background: #111a15;"
  >
    <div id="hint">Lia camera xuống sàn rồi chạm để đặt</div>
    <div id="custom-ar-btn" slot="ar-button" style="display:none"></div>
  </model-viewer>

  <div id="custom-ar-btn-outside">
    <div style="position:absolute;bottom:0;left:0;right:0;padding:20px 20px 44px;background:linear-gradient(to top,rgba(0,0,0,0.8),transparent);z-index:10;">
      <button id="launch-ar" onclick="launchAR()">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/>
        </svg>
        Mở AR thật để track mặt đất
      </button>
    </div>
  </div>
</div>

<!-- ══════════ iOS FALLBACK ══════════ -->
<div id="ios-fallback">
  <svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="#2ECC8A" stroke-width="1.5">
    <path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/>
  </svg>
  <h2>Xem AR trên iPhone</h2>
  <p>Safari sẽ mở AR Quick Look — nhân vật xuất hiện ngay trên sàn nhà của bạn.</p>
  <a id="ios-ar-link" href="model_test_01.usdz" rel="ar">
    <button class="btn-ar" style="max-width:320px;width:100%;">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2">
        <path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/>
      </svg>
      Mở AR Quick Look (Safari)
    </button>
  </a>
  <button class="btn-back" onclick="hideIOSFallback()">← Quay lại</button>
</div>

<script>
  const isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent) && !window.MSStream;
  const isSafari = /^((?!chrome|android).)*safari/i.test(navigator.userAgent);
  const mv = document.getElementById('mv');

  // Fix orientation & scale khi model load xong
  mv.addEventListener('load', () => {
    // Reset rotation: đảm bảo nhân vật đứng thẳng, mặt hướng ra ngoài
    mv.setAttribute('orientation', '0deg 0deg 0deg');
    // Scale lớn hơn để không quá nhỏ trên sàn
    mv.setAttribute('scale', '1.5 1.5 1.5');
  });

  // Khi vào AR session - hiện hint
  mv.addEventListener('ar-status', (e) => {
    const hint = document.getElementById('hint');
    if (e.detail.status === 'session-started') {
      hint.classList.add('show');
      setTimeout(() => hint.classList.remove('show'), 4000);
    }
  });

  function openAR() {
    // Nếu iOS Safari → dùng AR Quick Look trực tiếp
    if (isIOS && isSafari) {
      showIOSFallback();
      return;
    }
    // Nếu iOS không phải Safari (Chrome iOS) → báo dùng Safari
    if (isIOS && !isSafari) {
      alert('Vui lòng mở link này bằng Safari để dùng AR trên iPhone!');
      return;
    }
    // Android / Desktop → dùng WebXR / Scene Viewer
    document.getElementById('landing').style.display = 'none';
    document.getElementById('ar-screen').style.display = 'block';
  }

  function launchAR() {
    if (!mv.canActivateAR) {
      alert('Thiết bị hoặc trình duyệt của bạn chưa hỗ trợ WebAR. Hãy thử trên Chrome Android hoặc Safari iPhone.');
      return;
    }
    mv.activateAR();
  }

  function closeAR() {
    document.getElementById('ar-screen').style.display = 'none';
    document.getElementById('landing').style.display = 'flex';
  }

  function showIOSFallback() {
    document.getElementById('ios-fallback').style.display = 'flex';
  }

  function hideIOSFallback() {
    document.getElementById('ios-fallback').style.display = 'none';
  }

  function showInfo() {
    alert('Hướng dẫn:\n1. Nhấn nút "Mở AR"\n2. Lia camera xuống sàn nhà\n3. Khi nhận diện được mặt đất, chạm vào màn hình để đặt nhân vật\n4. Di chuyển xung quanh để xem nhân vật từ các góc khác nhau');
  }

  // Nếu đang trên iOS Safari → nút "Mở AR" sẽ kích hoạt AR Quick Look ngay
</script>
</body>
</html>
